<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Misc Cleaning LLC</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Poppins',sans-serif;
      background:#f4f7f9;
      color:#222;
    }

    header{
      background:#0d3b66;
      color:white;
      padding:20px 8%;
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    .logo{
      font-size:32px;
      font-weight:700;
    }

    .home-btn{
      background:#84dcc6;
      color:#0d3b66;
      padding:12px 24px;
      text-decoration:none;
      border-radius:40px;
      font-weight:700;
    }

    .contact-hero{
      background:linear-gradient(rgba(13,59,102,.85),rgba(13,59,102,.85)),
      url('Misc Cleaning Background.png');
      background-size:cover;
      background-position:center;
      color:white;
      text-align:center;
      padding:80px 8%;
    }

    .contact-hero h1{
      font-size:48px;
      margin-bottom:15px;
    }

    .contact-hero p{
      font-size:20px;
    }

    .contact-section{
      padding:70px 8%;
      display:flex;
      justify-content:center;
    }

    .contact-box{
      background:white;
      width:100%;
      max-width:750px;
      padding:45px;
      border-radius:20px;
      box-shadow:0 8px 30px rgba(0,0,0,.12);
    }

    form{
      display:grid;
      gap:18px;
    }

    input, textarea{
      width:100%;
      padding:15px;
      border:1px solid #ccc;
      border-radius:10px;
      font-family:'Poppins',sans-serif;
      font-size:16px;
    }

    textarea{
      min-height:150px;
      resize:vertical;
    }

    button{
      background:#0d3b66;
      color:white;
      border:none;
      padding:16px;
      border-radius:40px;
      font-size:17px;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
    }

    button:hover{
      background:#84dcc6;
      color:#0d3b66;
    }

    .info{
      text-align:center;
      margin-top:30px;
      color:#555;
      line-height:1.8;
    }

    footer{
      background:#081f36;
      color:white;
      text-align:center;
      padding:25px;
    }

    @media(max-width:768px){
      header{
        flex-direction:column;
        gap:15px;
      }

      .contact-hero h1{
        font-size:36px;
      }

      .contact-box{
        padding:30px 22px;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">MISC Cleaning LLC</div>
  <a href="index.html" class="home-btn">← Home</a>
</header>

<section class="contact-hero">
  <h1>Contact Misc Cleaning</h1>
  <p>Have a question or need cleaning services? Send us a message below.</p>
</section>

<section class="contact-section">
  <div class="contact-box">

    <form action="https://formspree.io/f/xqapgvzj" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <input type="tel" name="phone" placeholder="Phone Number">

      <textarea name="message" placeholder="How can we help you?" required></textarea>

      <button type="submit">Send Message</button>

    </form>

    <div class="info">
      <p><strong>Email:</strong> misccleaning@gmail.com</p>
      <p><strong>Serving:</strong> Macomb County, Michigan</p>
      <p>Women-Owned & Fully Insured</p>
    </div>

  </div>
</section>

<footer>
  © 2026 MISC Cleaning LLC — All Rights Reserved
</footer>

</body>
</html>
