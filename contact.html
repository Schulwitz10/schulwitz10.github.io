<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | Mighty Mike Tales</title>

  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      font-family:'Comic Neue', cursive;
      background:#111;
      color:white;
      min-height:100vh;
    }

.contact-container{
    width:90%;
    max-width:700px;
    margin:80px auto;
    background:rgba(0,0,30,.88);
    border:4px solid #8cff00;
    border-radius:30px;
    padding:50px;
    box-shadow:0 0 35px #8cff00;
}

nav a{
  display:inline-block;
  background:#8cff00;
  color:#111;
  text-decoration:none;
  padding:12px 22px;
  margin:5px;
  border-radius:30px;
  font-weight:700;
  transition:.3s;
}

nav a:hover{
  background:#2ea3f2;
  color:white;
  transform:scale(1.05);
}

    .hero{
      min-height:90vh;
      background:linear-gradient(rgba(0,0,0,.72),rgba(0,0,0,.82)),
      url('Background.png');
      background-size:cover;
      background-position:center;
      padding:80px 8%;
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .contact-box{
      width:100%;
      max-width:750px;
      background:rgba(15,15,25,.92);
      border:4px solid #8cff00;
      border-radius:28px;
      padding:45px;
      text-align:center;
      box-shadow:0 0 30px rgba(140,255,0,.45);
    }

    h1{
      font-size:48px;
      color:#8cff00;
      margin-bottom:15px;
      text-shadow:3px 3px #000;
    }

    p{
      font-size:22px;
      margin-bottom:30px;
      color:#fff;
    }

    form{
      display:grid;
      gap:18px;
    }

    input, textarea{
      width:100%;
      padding:16px;
      border-radius:15px;
      border:3px solid #8cff00;
      font-size:18px;
      font-family:'Comic Neue', cursive;
      outline:none;
    }

    textarea{
      min-height:160px;
      resize:vertical;
    }

    button{
      background:#8cff00;
      color:#111;
      border:none;
      padding:16px;
      border-radius:35px;
      font-size:22px;
      font-weight:700;
      cursor:pointer;
      transition:.3s;
      font-family:'Comic Neue', cursive;
    }

    button:hover{
      background:#2ea3f2;
      color:white;
      transform:scale(1.04);
    }

    footer{
      background:#141414;
      text-align:center;
      padding:25px;
      border-top:4px solid #8cff00;
      font-size:18px;
    }

    @media(max-width:768px){
      h1{
        font-size:36px;
      }

      .contact-box{
        padding:30px 22px;
      }

      nav a{
        padding:10px 16px;
      }
    }
  </style>
</head>

<body>

<nav>
    <div class="nav-container">
      <a href="index.html" class="nav-btn"> Home</a>
      <a href="books.html" class="nav-btn"> Books</a>
      <a href="index.html#about" class="nav-btn"> About Me</a>
      <a href="stories.html" class="nav-btn"> Stories</a>
      <a href="coloring.html" class="nav-btn"> Printables</a>
      <a href="blog.html" class="nav-btn"> Blog</a>
      <a href="contact.html" class="nav-btn"> Contact</a>
      <a href="https://www.etsy.com/shop/MightyMikeTales?ref=dashboard-header" target="_blank" class="nav-btn"> Etsy Store</a>
    </div>
  </nav>


<section class="hero">
  <div class="contact-box">

    <h1>Contact Mighty Mike Tales</h1>

    <p>
      Have a question, idea, or message? Send me a note below!
    </p>

    <form action="https://formspree.io/f/xqapgvzj" method="POST">

      <input type="text" name="name" placeholder="Your Name" required>

      <input type="email" name="email" placeholder="Your Email" required>

      <textarea name="message" placeholder="Your Message" required></textarea>

      <button type="submit">Send Message</button>

    </form>

  </div>
</section>

<footer>
  © 2026 Mighty Mike Tales — All Rights Reserved
</footer>

</body>
</html>
